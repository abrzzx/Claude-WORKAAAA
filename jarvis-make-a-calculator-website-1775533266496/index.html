<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0V4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --bg-color-1: #1a0f2b; /* Dark purple */
            --bg-color-2: #3a1c71; /* Medium purple */
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #e0e0e0;
            --accent-color-1: #8a2be2; /* Blue violet */
            --accent-color-2: #d8b4fe; /* Light purple */
            --operator-color: #6a0dad; /* Darker purple */
            --equals-color: #00bcd4; /* Cyan */
            --clear-color: #e74c3c; /* Red */
            --blur-amount: 15px;
            --border-radius: 20px;
            --button-radius: 12px;
            --shadow-light: rgba(0, 0, 0, 0.2);
            --shadow-dark: rgba(0, 0, 0, 0.4);
            --glow-color: rgba(138, 43, 226, 0.5);
            --font-family: 'Poppins', sans-serif;
            --display-font-size-lg: clamp(2.5rem, 8vw, 4rem);
            --display-font-size-sm: clamp(1rem, 4vw, 1.5rem);
            --button-font-size: clamp(1.2rem, 5vw, 2rem);
        }

        /* Base styles */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Prevent text selection on calculator */
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Hide overflowing pseudo-elements */
            position: relative;
            animation: fadeIn 1s ease-out forwards;
        }

        /* Animated background elements with parallax variables */
        body::before,
        body::after {
            content: '';
            position: absolute;
            background: linear-gradient(45deg, var(--accent-color-1), var(--equals-color));
            border-radius: 50%;
            filter: blur(80px); /* Stronger blur for background elements */
            opacity: 0.3;
            z-index: -1;
            transition: transform 0.1s ease-out; /* Smooth parallax movement */
        }

        body::before {
            width: 300px;
            height: 300px;
            top: -10%;
            left: -10%;
            transform: translate(var(--x-offset, 0px), var(--y-offset, 0px));
        }

        body::after {
            width: 400px;
            height: 400px;
            bottom: -15%;
            right: -15%;
            transform: translate(var(--x-offset-alt, 0px), var(--y-offset-alt, 0px)) rotate(30deg);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Calculator container */
        .calculator {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount)); /* Safari support */
            border-radius: var(--border-radius);
            box-shadow: 0 8px 32px var(--shadow-dark);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 400px;
            width: 90%; /* Responsive width */
            position: relative;
            z-index: 10;
            animation: slideInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; /* More refined animation */
            transform: translateY(20px);
            opacity: 0;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(50px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Display area */
        .calculator-display {
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--button-radius);
            padding: 1.5rem 1rem;
            text-align: right;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
            word-break: break-all;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 5px var(--shadow-dark);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.3s ease, border-color 0.3s ease; /* Smooth transition for error state */
        }

        .calculator-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
            z-index: 0;
        }

        .calculator-display #previous-operand {
            font-size: var(--display-font-size-sm);
            color: rgba(var(--text-color), 0.7);
            min-height: 1.5em;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .calculator-display #current-operand {
            font-size: var(--display-font-size-lg);
            color: var(--text-color);
            min-height: 1.2em;
            font-weight: 600;
            text-shadow: 0 0 8px var(--glow-color);
            z-index: 1;
            transition: font-size 0.2s ease-out, color 0.2s ease-out, text-shadow 0.2s ease-out;
            line-height: 1; /* Ensures text fits better */
        }

        .calculator-display.error {
            background: rgba(231, 76, 60, 0.2); /* Soft red background for error */
            border-color: var(--clear-color);
        }

        .calculator-display.error #current-operand {
            color: var(--clear-color);
            text-shadow: 0 0 10px rgba(231, 76, 60, 0.8);
        }

        /* Buttons grid */
        .calculator-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        /* Base button styles */
        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); /* Slight blur on buttons too */
            -webkit-backdrop-filter: blur(5px); /* Safari support */
            color: var(--text-color);
            font-size: var(--button-font-size);
            font-weight: 600;
            padding: 1rem;
            border-radius: var(--button-radius);
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 10px var(--shadow-light);
            will-change: transform, background, box-shadow;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 15px var(--shadow-dark), 0 0 15px var(--glow-color);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 2px 5px var(--shadow-dark);
            background: rgba(255, 255, 255, 0.03);
            transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
        }

        /* Add a subtle active state for keyboard presses */
        .btn-active-key {
            transform: translateY(0) scale(0.98) !important; /* Override potential hover/focus */
            box-shadow: 0 2px 5px var(--shadow-dark) !important;
            background: rgba(255, 255, 255, 0.03) !important;
            transition: none !important; /* Disable transition for immediate feedback */
        }

        /* Dynamic ripple effect */
        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5); /* Brighter ripple */
            transform: scale(0);
            opacity: 1;
            animation: ripple-animation 0.6s linear forwards;
            pointer-events: none; /* Ensure clicks pass through */
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Specific button styles */
        .btn-operator {
            color: var(--accent-color-2);
            background: var(--operator-color);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }
        .btn-operator:hover {
            background: linear-gradient(90deg, var(--operator-color), #9932cc); /* Dark orchid */
            box-shadow: 0 6px 15px var(--shadow-dark), 0 0 15px rgba(153, 50, 204, 0.6); /* Operator glow */
        }

        .btn-equals {
            grid-column: span 2;
            background: var(--equals-color);
            color: var(--bg-color-1);
            font-weight: 700;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 10px rgba(0, 188, 212, 0.4);
        }
        .btn-equals:hover {
            background: linear-gradient(90deg, var(--equals-color), #00e5ff); /* Brighter cyan */
            box-shadow: 0 6px 15px rgba(0, 188, 212, 0.6), 0 0 15px rgba(0, 188, 212, 0.8);
        }

        .btn-clear {
            background: var(--clear-color);
            color: var(--text-color);
            font-weight: 700;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }
        .btn-clear:hover {
            background: linear-gradient(90deg, var(--clear-color), #c0392b); /* Darker red */
            box-shadow: 0 6px 15px var(--shadow-dark), 0 0 15px rgba(231, 76, 60, 0.6); /* Clear glow */
        }

        .btn-zero {
            grid-column: span 2;
        }

        .btn-backspace i {
            font-size: var(--button-font-size);
        }

        /* Accessibility: Focus states */
        .btn:focus-visible {
            outline: none; /* Remove default outline */
            box-shadow: 0 0 0 3px var(--equals-color), 0 0 15px var(--equals-color); /* Custom focus glow */
            transform: translateY(-1px) scale(1.01);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .calculator {
                padding: 1.5rem;
                gap: 1rem;
                max-width: 350px;
            }
            .calculator-display {
                min-height: 100px;
                padding: 1rem 0.8rem;
            }
            .calculator-buttons {
                gap: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .calculator {
                padding: 1rem;
                gap: 0.8rem;
                width: 95%;
            }
            .calculator-display {
                min-height: 80px;
                padding: 0.8rem 0.6rem;
            }
            .calculator-buttons {
                gap: 0.6rem;
            }
            .btn {
                padding: 0.8rem;
            }
            :root {
                --button-font-size: clamp(1rem, 4.5vw, 1.8rem);
            }
        }
    </style>
</head>
<body>

        </div>
        <div class="calculator-buttons">
            <button class="btn btn-clear" data-type="clear">C</button>
            <button class="btn btn-backspace" data-type="backspace"><i class="fas fa-backspace"></i></button>
            <button class="btn btn-operator" data-type="operator" data-value="/">/</button>
            <button class="btn btn-operator" data-type="operator" data-value="*">*</button>

            <button class="btn" data-type="number" data-value="7">7</button>
            <button class="btn" data-type="number" data-value="8">8</button>
            <button class="btn" data-type="number" data-value="9">9</button>
            <button class="btn btn-operator" data-type="operator" data-value="-">-</button>

            <button class="btn" data-type="number" data-value="4">4</button>
            <button class="btn" data-type="number" data-value="5">5</button>
            <button class="btn" data-type="number" data-value="6">6</button>
            <button class="btn btn-operator" data-type="operator" data-value="+">+</button>

            <button class="btn" data-type="number" data-value="1">1</button>
            <button class="btn" data-type="number" data-value="2">2</button>
            <button class="btn" data-type="number" data-value="3">3</button>
            <button class="btn btn-equals" data-type="equals">=</button>

            <button class="btn btn-zero" data-type="number" data-value="0">0</button>
            <button class="btn" data-type="decimal" data-value=".">.</button>
        </div>
    </div>

                clear();
                return;
            }
            if (currentInput === '0' || currentInput.length === 1) {
                currentInput = '0';
            } else {
                currentInput = currentInput.slice(0, -1);
            }
            updateDisplay();

            if (hasError) {
                clear();
            }

            if (shouldResetDisplay) {
                currentInput = number;
                shouldResetDisplay = false;
            } else {
                if (currentInput === '0' && number !== '.') {
                    currentInput = number;
                } else {
                    currentInput += number;
                }
            }
            updateDisplay();
        }

                currentInput = '0.';
                shouldResetDisplay = false;
                updateDisplay();
                return;
            }
            if (!currentInput.includes('.')) {
                currentInput += '.';
            }
            updateDisplay();
        }
