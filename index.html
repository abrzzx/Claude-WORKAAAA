<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. Calculator</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' font-size='90' text-anchor='middle' dominant-baseline='central'%3E%2B%3C/text%3E%3C/svg%3E" type="image/svg+xml">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap');

        :root {
            --bg-gradient-start: #1a0033; /* Dark purple */
            --bg-gradient-end: #000000;   /* Black */
            --calculator-bg: rgba(255, 255, 255, 0.08);
            --calculator-border: rgba(255, 255, 255, 0.18);
            --calculator-shadow-color: rgba(31, 38, 135, 0.37);
            --blur-intensity: 15px;
            --text-color-primary: #e0e0e0;
            --text-color-secondary: #a0a0a0;
            --button-bg: rgba(255, 255, 255, 0.05);
            --button-hover-bg: rgba(255, 255, 255, 0.15);
            --button-active-bg: rgba(255, 255, 255, 0.03);
            --operator-color: #8aff8a; /* Vibrant Green */
            --equals-color: #66b3ff;   /* Vibrant Blue */
            --clear-del-color: #ff6666; /* Vibrant Red */
            --display-font: 'Roboto Mono', monospace;
            --button-font: 'Orbitron', sans-serif;
            --border-radius-main: 20px;
            --border-radius-buttons: 12px;
            --transition-speed: 0.2s ease-out;
            --glow-color-1: rgba(138, 43, 226, 0.5); /* Blue Violet */
            --glow-color-2: rgba(0, 255, 255, 0.5); /* Cyan */
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--display-font);
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-color-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative; /* For background pseudo-element */
        }

        /* Subtle animated background particles/glow */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top left, var(--glow-color-1) 0%, transparent 70%),
                        radial-gradient(circle at bottom right, var(--glow-color-2) 0%, transparent 70%);
            opacity: 0.2;
            z-index: -1;
            animation: backgroundPulse 15s infinite alternate ease-in-out;
        }

        @keyframes backgroundPulse {
            0% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.05); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.2; }
        }

        .calculator-container {
            position: relative;
            width: 90%;
            max-width: 360px;
            padding: 25px;
            border-radius: var(--border-radius-main);
            background: var(--calculator-bg);
            border: 1px solid var(--calculator-border);
            box-shadow: 0 8px 32px 0 var(--calculator-shadow-color);
            backdrop-filter: blur(var(--blur-intensity));
            -webkit-backdrop-filter: blur(var(--blur-intensity));
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeInScale 0.8s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1; /* Ensure calculator is above background */
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .calculator-title {
            font-family: var(--button-font); /* Orbitron */
            font-size: 1.8em;
            text-align: center;
            color: var(--text-color-primary);
            margin-bottom: 5px;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px var(--glow-color-1);
            animation: pulseTitleGlow 3s infinite alternate ease-in-out;
        }

        @keyframes pulseTitleGlow {
            0% { text-shadow: 0 0 10px var(--glow-color-1), 0 0 20px var(--glow-color-2); }
            50% { text-shadow: 0 0 15px var(--glow-color-2), 0 0 25px var(--glow-color-1); }
            100% { text-shadow: 0 0 10px var(--glow-color-1), 0 0 20px var(--glow-color-2); }
        }

        .calculator-display {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius-buttons);
            padding: 20px;
            font-size: 2.8em; /* Base font size, will be dynamically adjusted */
            text-align: right;
            color: var(--text-color-primary);
            min-height: 80px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            word-wrap: break-word;
            word-break: break-all;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: background var(--transition-speed), font-size 0.1s ease-out;
            white-space: nowrap; /* Help with dynamic font sizing */
        }

        .calculator-display.error-state {
            background: rgba(255, 0, 0, 0.15);
            box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.6), 0 0 15px rgba(255, 0, 0, 0.4);
            animation: errorFlash 0.3s ease-out forwards;
        }

        @keyframes errorFlash {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .calculator-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .btn {
            font-family: var(--button-font); /* Orbitron */
            font-size: 1.5em;
            padding: 15px 10px;
            border: none;
            border-radius: var(--border-radius-buttons);
            background: var(--button-bg);
            color: var(--text-color-primary);
            cursor: pointer;
            outline: none;
            transition: background var(--transition-speed), transform var(--transition-speed), box-shadow var(--transition-speed);
            position: relative;
            overflow: hidden;
            user-select: none; /* Prevent text selection */
            -webkit-tap-highlight-color: transparent; /* Remove tap highlight on mobile */
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            opacity: 0;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease-out, height 0.3s ease-out, opacity 0.3s ease-out;
            z-index: 0;
        }

        .btn:hover::before {
            width: 150%;
            height: 150%;
            opacity: 0.1;
        }

        .btn:active::before {
            width: 200%;
            height: 200%;
            opacity: 0.2;
            transition: 0s; /* Instant feedback on active */
        }

        .btn:hover {
            background: var(--button-hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            background: var(--button-active-bg);
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .btn.operator {
            color: var(--operator-color);
            font-weight: 700;
        }

        .btn.equals {
            grid-column: span 2;
            background: var(--equals-color);
            color: #000;
            font-weight: 700;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .btn.equals:hover {
            background: #8cd3ff; /* Lighter blue */
            box-shadow: 0 4px 20px rgba(102, 179, 255, 0.6);
        }
        .btn.equals:active {
            background: #4da6ff; /* Darker blue */
            box-shadow: 0 2px 10px rgba(102, 179, 255, 0.4);
        }

        .btn.clear, .btn.delete {
            color: var(--clear-del-color);
            font-weight: 700;
        }

        /* Micro-interaction for key press visual feedback */
        .btn.pressed {
            transform: translateY(0) scale(0.95);
            background: var(--button-active-bg);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.05s ease-out, background 0.05s ease-out;
        }

        /* Responsive adjustments */
        @media (max-width: 400px) {
            .calculator-container {
                padding: 15px;
                gap: 15px;
            }
            .calculator-title {
                font-size: 1.5em;
            }
            .calculator-display {
                font-size: 2.2em;
                padding: 15px;
                min-height: 70px;
            }
            .calculator-buttons {
                gap: 10px;
            }
            .btn {
                font-size: 1.3em;
                padding: 12px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <h2 class="calculator-title">J.A.R.V.I.S. Calc</h2>
        <div class="calculator-display" id="display">0</div>
        <div class="calculator-buttons">
            <button class="btn clear" data-action="clear">AC</button>
            <button class="btn delete" data-action="delete">DEL</button>
            <button class="btn operator" data-operator="%">%</button>
            <button class="btn operator" data-operator="÷">÷</button>

            <button class="btn number" data-number="7">7</button>
            <button class="btn number" data-number="8">8</button>
            <button class="btn number" data-number="9">9</button>
            <button class="btn operator" data-operator="×">×</button>

            <button class="btn number" data-number="4">4</button>
            <button class="btn number" data-number="5">5</button>
            <button class="btn number" data-number="6">6</button>
            <button class="btn operator" data-operator="-">-</button>

            <button class="btn number" data-number="1">1</button>
            <button class="btn number" data-number="2">2</button>
            <button class="btn number" data-number="3">3</button>
            <button class="btn operator" data-operator="+">+</button>

            <button class="btn number" data-number="0">0</button>
            <button class="btn number" data-number=".">.</button>
            <button class="btn equals" data-action="equals">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const calculatorButtons = document.querySelector('.calculator-buttons');

        let currentOperand = '';
        let previousOperand = '';
        let operation = undefined;
        let waitingForSecondOperand = false;
        let lastResult = null; // Store the last computed result

        function clear() {
            currentOperand = '';
            previousOperand = '';
            operation = undefined;
            waitingForSecondOperand = false;
            lastResult = null;
            display.classList.remove('error-state');
        }

        function del() {
            if (currentOperand === 'Error') {
                clear();
                return;
            }
            currentOperand = currentOperand.toString().slice(0, -1);
            if (currentOperand === '') {
                currentOperand = '';
            }
        }

        function appendNumber(number) {
            if (currentOperand === 'Error') {
                clear();
            }
            if (number === '.' && currentOperand.includes('.')) return;
            if (waitingForSecondOperand) {
                currentOperand = number.toString();
                waitingForSecondOperand = false;
            } else {
                currentOperand = currentOperand.toString() + number.toString();
            }
        }

        function chooseOperation(op) {
            if (currentOperand === 'Error') return;
            if (currentOperand === '' && previousOperand === '') return;

            if (currentOperand === '' && previousOperand !== '') {
                // Allow changing operator if no current operand
                operation = op;
                return;
            }

            if (previousOperand !== '') {
                compute();
            }
            operation = op;
            previousOperand = currentOperand;
            currentOperand = '';
            waitingForSecondOperand = true;
        }

        function compute() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case '+':
                    computation = prev + current;
                    break;
                case '-':
                    computation = prev - current;
                    break;
                case '×':
                    computation = prev * current;
                    break;
                case '÷':
                    if (current === 0) {
                        computation = 'Error';
                    } else {
                        computation = prev / current;
                    }
                    break;
                case '%':
                    computation = prev % current;
                    break;
                default:
                    return;
            }

            if (computation === 'Error') {
                currentOperand = 'Error';
                display.classList.add('error-state');
            } else {
                currentOperand = parseFloat(computation.toFixed(10)).toString(); // Fix floating point issues
                display.classList.remove('error-state');
            }
            operation = undefined;
            previousOperand = '';
            waitingForSecondOperand = true; // Ready for a new operation after equals
            lastResult = currentOperand;
        }

        function getDisplayNumber(number) {
            if (number === 'Error') return 'Error';
            if (number === '') return '';
            const stringNumber = number.toString();
            const integerDigits = parseFloat(stringNumber.split('.')[0]);
            const decimalDigits = stringNumber.split('.')[1];
            let integerDisplay;
            if (isNaN(integerDigits)) {
                integerDisplay = '';
            } else {
                integerDisplay = new Intl.NumberFormat('en', {
                    maximumFractionDigits: 0
                }).format(integerDigits);
            }
            if (decimalDigits != null) {
                return `${integerDisplay}.${decimalDigits}`;
            } else {
                return integerDisplay;
            }
        }

        function updateDisplay() {
            let displayValue = getDisplayNumber(currentOperand);
            if (displayValue === '') {
                displayValue = getDisplayNumber(previousOperand);
                if (displayValue === '' && lastResult !== null) { // Show last result if no active input
                    displayValue = getDisplayNumber(lastResult);
                } else if (displayValue === '') {
                    displayValue = '0';
                }
            }

            if (operation != null && currentOperand === '') {
                display.innerText = `${getDisplayNumber(previousOperand)} ${operation}`;
            } else {
                display.innerText = displayValue;
            }

            // Dynamic font sizing for display
            const maxFontSize = 2.8; /* em */
            const minFontSize = 1.2; /* em */
            const maxLength = 12; // Max characters before scaling down
            const displayLength = display.innerText.length;

            if (displayLength > maxLength) {
                const scaleFactor = Math.max(minFontSize, maxFontSize * (maxLength / displayLength));
                display.style.fontSize = `${scaleFactor}em`;
            } else {
                display.style.fontSize = `${maxFontSize}em`;
            }
        }

        // Initialize display
        updateDisplay();

        calculatorButtons.addEventListener('click', e => {
            const button = e.target.closest('.btn');
            if (!button) return;

            const action = button.dataset.action;
            const number = button.dataset.number;
            const operator = button.dataset.operator;

            // Add 'pressed' class for visual feedback
            button.classList.add('pressed');
            setTimeout(() => button.classList.remove('pressed'), 100); // Remove after short delay

            if (number != null) {
                appendNumber(number);
            } else if (operator != null) {
                chooseOperation(operator);
            } else if (action === 'clear') {
                clear();
            } else if (action === 'delete') {
                del();
            } else if (action === 'equals') {
                compute();
            }
            updateDisplay();
        });

        // Keyboard support
        document.addEventListener('keydown', e => {
            const key = e.key;
            let targetButton;

            if (key >= '0' && key <= '9') {
                targetButton = document.querySelector(`.btn[data-number="${key}"]`);
                appendNumber(key);
            } else if (key === '.') {
                targetButton = document.querySelector(`.btn[data-number="."`);
                appendNumber('.');
            } else if (key === '+' || key === '-') {
                targetButton = document.querySelector(`.btn[data-operator="${key}"]`);
                chooseOperation(key);
            } else if (key === '*' || key === 'x') {
                targetButton = document.querySelector(`.btn[data-operator="×"]`);
                chooseOperation('×');
            } else if (key === '/' || key === '÷') {
                targetButton = document.querySelector(`.btn[data-operator="÷"]`);
                e.preventDefault(); // Prevent browser quick search
                chooseOperation('÷');
            } else if (key === '%') {
                targetButton = document.querySelector(`.btn[data-operator="%"]`);
                chooseOperation('%');
            } else if (key === 'Enter' || key === '=') {
                targetButton = document.querySelector(`.btn[data-action="equals"]`);
                compute();
            } else if (key === 'Backspace') {
                targetButton = document.querySelector(`.btn[data-action="delete"]`);
                del();
            } else if (key === 'Escape') {
                targetButton = document.querySelector(`.btn[data-action="clear"]`);
                clear();
            }

            // Add 'pressed' class for keyboard feedback
            if (targetButton) {
                targetButton.classList.add('pressed');
                setTimeout(() => targetButton.classList.remove('pressed'), 100);
            }
            updateDisplay();
        });
    </script>
</body>
</html>
