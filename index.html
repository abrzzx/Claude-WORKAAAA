<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. TETRIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color-dark: #1a1a2e;
            --bg-color-light: #0f3460;
            --glass-bg-start: rgba(255, 255, 255, 0.1);
            --glass-bg-end: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.25);
            --text-color: #e0e0e0;
            --accent-color: #e94560;
            --primary-button-bg: #e94560;
            --primary-button-hover: #ff6a80;
            --secondary-button-bg: #007bff;
            --secondary-button-hover: #009dff;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Roboto Mono', monospace;
            --board-border-width: 4px;
            --transition-speed: 0.3s;
            --border-radius-lg: 25px;
            --border-radius-md: 15px;
            --border-radius-sm: 8px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: var(--font-body);
            color: var(--text-color);
            background: linear-gradient(135deg, var(--bg-color-dark) 0%, var(--bg-color-light) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            line-height: 1.5;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 95%;
            width: 1200px;
            padding: 25px;
            background: linear-gradient(145deg, var(--glass-bg-start), var(--glass-bg-end));
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: 0 12px 40px var(--shadow-color);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            animation: fadeIn 1s ease-out forwards;
            transform-style: preserve-3d;
            perspective: 1000px;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-family: var(--font-display);
            color: var(--accent-color);
            text-shadow: 0 0 12px var(--accent-color), 0 0 25px var(--accent-color), 0 0 40px rgba(233, 69, 96, 0.5);
            margin-bottom: 15px;
            font-size: 2.8em;
            letter-spacing: 3px;
            animation: pulse 2.5s infinite alternate ease-in-out;
            transform: translateZ(25px);
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 8px var(--accent-color), 0 0 18px var(--accent-color); }
            100% { text-shadow: 0 0 18px var(--accent-color), 0 0 35px var(--accent-color), 0 0 50px rgba(233, 69, 96, 0.6); }
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 25px;
            width: 100%;
            max-width: 1000px;
            align-items: flex-start;
            margin-top: 20px;
            transform: translateZ(15px);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            border-radius: var(--border-radius-md);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 6px 20px var(--shadow-color);
            transform: translateZ(8px);
            transition: all var(--transition-speed) ease;
        }

        .sidebar:hover {
            box-shadow: 0 8px 25px var(--shadow-color);
            transform: translateZ(10px) translateY(-2px);
        }

        .sidebar-item {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: var(--border-radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .sidebar-item:hover {
            transform: translateY(-3px);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
        }

        .sidebar-item::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.07) 0%, transparent 70%);
            animation: rotateLight 20s linear infinite;
            opacity: 0.6;
            z-index: 0;
            pointer-events: none
